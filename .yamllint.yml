# .yamllint.yml - regras de lint para YAML (pre-commit)
#
# Default relaxed + ajustes para dbt/GCP:
#   - Permite linhas longas (URLs, descrições em PT-BR com acentuação)
#   - Permite `on:` e `True/False` (keys comuns em GitHub Actions)
#   - Indent 2 (dbt_project.yml, profiles, sources, schemas)
# =============================================================================

extends: default

rules:
  line-length:
    max: 200
    level: warning
  indentation:
    spaces: 2
    indent-sequences: consistent
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']    # GH Actions + dbt freshness
    check-keys: false
  document-start: disable         # dbt YAMLs não começam com `---`
  comments:
    min-spaces-from-content: 1    # comentários `# X` sem 2-espaços antes são comuns em dbt YAML

ignore: |
  .venv/
  target/
  dbt_packages/
  logs/
  exploratory_data_analysis/figures/
  results/figures/
