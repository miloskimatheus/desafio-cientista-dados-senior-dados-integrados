# ==============================================================================
# CI offline — Desafio RMI Educação
#
# Postura de custo zero: este workflow NUNCA conecta ao BigQuery.
# Rodam apenas validações offline:
#   - dbt parse        → valida refs, sources, Jinja e estrutura de manifest
#   - dbt compile      → renderiza SQL de TODOS os modelos (sem executar) —
#                        valida sintaxe Jinja+SQL ponta-a-ponta, configs e
#                        contracts contra o manifest gerado pelo parse
#   - sqlfluff lint    → estilo SQL
#   - yamllint         → estrutura YAML
#   - detect-secrets   → leakage
#
# Build contra o BigQuery e demais validacoes que exijam cota acontecem
# apenas localmente, via `dbt build --target dev_bq`. Nao ha workflow remoto
# que execute queries no Sandbox.
#
# Referência: ver REPORT.md §3.7 (CI/CD e segurança).
# ==============================================================================
name: CI (offline)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela execuções antigas do mesmo PR para economizar minutos de Actions.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-parse:
    name: Lint e parse offline (sem BigQuery)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Credenciais BQ mockadas — `dbt parse/compile` não abre conexão, mas o
    # adapter valida a presença do profile. `DBT_GCP_PROJECT` é exigido pelo
    # `env_var()` em `profiles-example.yml`; valor mock nunca é usado em query.
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.github
      DBT_GCP_PROJECT: ci-mock-project

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Paridade com o pre-commit local: linters pinados em `requirements-dev.txt`
      # e configs de lint versionadas (`.yamllint.yml`, `.secrets.baseline`,
      # `.sqlfluff`). CI e dev local rodam a MESMA versão de cada ferramenta.
      - name: Instalar dependências (dbt runtime + linters pinados)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: dbt deps
        run: dbt deps

      - name: dbt parse (offline — valida manifest, refs, sources, Jinja)
        run: dbt parse --target dev_bq

      - name: dbt compile (offline — renderiza SQL de todos os modelos)
        # Compila sem executar: valida ponta-a-ponta a sintaxe Jinja+SQL e os
        # contracts (`enforced: true`) contra o manifest. Resultado em
        # `target/compiled/...` — diff útil para revisão de PR.
        run: dbt compile --target dev_bq

      - name: sqlfluff lint (dialeto bigquery, templater dbt — usa .sqlfluff)
        run: sqlfluff lint models/ tests/ macros/

      - name: yamllint (config versionada em .yamllint.yml)
        run: yamllint -c .yamllint.yml .

      - name: detect-secrets (incremental contra baseline versionado)
        run: |
          # `detect-secrets scan --baseline` atualiza o baseline in-place com
          # novos matches. Se o arquivo mudar, é sinal de secret novo no PR —
          # quebramos o job com `git diff --exit-code`.
          #
          # Para aceitar um novo match como falso-positivo, rode localmente:
          #   detect-secrets scan --baseline .secrets.baseline
          # e commite o baseline atualizado.
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '^(\.venv|dbt_packages|target|logs|exploratory_data_analysis/figures|results/figures)/'
          git diff --exit-code .secrets.baseline
